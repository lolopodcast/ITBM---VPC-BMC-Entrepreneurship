m1_nav:"1. V-P-C 架構",m1_title:"價值創造的本質：V-P-C 架構與市場動態",
m1_p1:"商業模式的成功建立在一個極簡的數學邏輯上：創造高於價格的價值 (V > P)，並將成本控制在價格之下 (P > C)。V-P-C 架構是這一切的出發點。",
m1_p2:"企業必須先區分消費者的 Wants (想要) 與 Needs (需要)，並切入 JTBD (Jobs To Be Done)，藉由解決痛點 (Pains) 與創造獲益 (Gains) 來推高目標客群 (TA) 的「願付價格 (WTP)」。這確立了產品定價的「天花板 (Ceiling)」。極致的目標是透過極致的價值創造走向獨占 (Monopoly)，達到「沒有競爭對手」的境界。",
m1_p3:"利潤的極大化不僅依賴定價，更需要壓低成本。隨著產量增加，平均成本會因「規模經濟 (EOS)」而下降，並在最小效率規模 (MES) 達到最佳狀態。同時，「熟能生巧 (Practice makes progress)」的「學習經濟 (EOL)」也會隨著經驗累積持續壓低單位成本。最終，總收益 (TR) 減去總成本 (TC) 就是企業真正的經濟利潤。",

m2_nav:"2. 策略校準",m2_title:"策略校準：從生態系統到財務績效",
m2_p1:"企業不存於真空之中。第二張板書提供了一個「由外而內、再由內而外」的架構，展示了外部環境變動如何一路影響到企業的最終財報數字。",
m2_p2:"分析始於最外圍的 PESTEL 總體環境，接著進入產業層級。在這裡，實體產品順著「產業價值鏈 (Industry Value Chain)」從上游原料流向下游終端用戶；而策略關係則透過「價值網 (Value Net)」與 PARTS 賽局理論來解析供應商、買家、競爭者與互補者 (Complementors) 之間的競合關係 (Co-opetition)。",
m2_p3:"當焦點轉入企業內部 (Firm-level)，Michael Porter 的企業價值鏈 (Corporate Value Chain) 將組織分為主要活動 (生產、物流、行銷) 與支援活動 (R&D、IT、HR、財務)。最精彩的是板書中的紅色連線：營運活動直接牽動了資產負債表 (B/S) 上的資產配置，並決定了損益表 (I/S) 上的營收與成本，最終產出淨利 (NOPAT)。營運與財務，是同一枚硬幣的兩面。",
m2_img_orig:"./532971.jpg",
m2_img_svg:SVG_ALIGNMENT,
m2_cards:[{title:"PARTS 賽局架構",desc:"除了傳統的競爭，企業必須考量 Players, Added Value, Rules, Tactics, Scope。透過合作做大餅，再透過競爭分餅，是現代商業的核心。"},{title:"財務報表的營運映射",desc:"資產負債表 (B/S) 反映了企業為了營運 (物流、生產) 必須準備的現金、庫存與機具；而損益表 (I/S) 則是行銷帶來營收 (Top Line)，扣除採購與生產的成本，反映出的獲利能力。"}],
m2_case_title:"顧問觀點：策略的一致性",
m2_case_desc:"這張全局圖的精髓在於「連貫性」。一個外部 PESTEL 環境的法規衝擊，會改變產業價值鏈的結構，迫使企業調整內部的支援活動 (如法務、IT 投資)，這將直接增加損益表上的費用 (Expense)，並可能改變資產負債表上的負債結構。好的策略家能一眼看穿這條因果鏈。",
m2_terms:[{front:"PESTEL",back:"分析總體環境的架構：政治、經濟、社會、科技、環境、法律因素。"},{front:"價值網 (Value Net)",back:"探討企業與供應商、顧客、競爭者及「互補者」之間策略關係的菱形架構。"},{front:"NOPAT",back:"Net Operating Profit After Tax (稅後淨營業利潤)：反映企業核心本業獲利能力的關鍵財務指標。"}],
m2_q:[
{q:"在產業分析中，哪一個模型加入了「互補者 (Complementors)」的概念？",opts:["PESTEL","產業價值鏈","價值網 (Value Net)","企業價值鏈"],ans:_A2,exp:"價值網 (Value Net) 擴充了傳統競爭視角，加入了互補者，強調競合關係。"},
{q:"Michael Porter 的企業價值鏈中，下列何者屬於「主要活動 (Primary Activities)」？",opts:["人力資源 (HR)","研究發展 (R&D)","出貨物流與銷售 (Outbound Logistics, Sales)","資訊科技 (IT)"],ans:_A2,exp:"主要活動是直接參與產品製造、銷售與交付的活動。HR、R&D、IT 屬於支援活動。"},
{q:"根據板書的紅色連線，企業價值鏈的運作結果，最終如何反映在損益表 (I/S) 上？",opts:["創造總收益 (Revenue) 大於成本 (Cost) 與費用 (Expense) 以產生淨利","僅影響資產總額","僅改變負債與股東權益的比例","與財務報表無直接關聯"],ans:_A0,exp:"板書右側明確指出，主要與支援活動必須創造大於成本和費用的營收，才能產生 Added Value (Profit)。"},
{q:"賽局理論中的 PARTS 模型，不包含下列哪一個元素？",opts:["Players (玩家)","Added Value (附加價值)","Rules (規則)","Substitutes (替代品)"],ans:_A3,exp:"PARTS 代表 Players, Added Value, Rules, Tactics, Scope。S 是 Scope 而非 Substitutes。"}
],

m3_nav:"3. 動態 BMC",m3_title:"動態商業模式與創業引擎",
m3_p1:"第三張板書聚焦於創業精神與單一企業的藍圖設計。創業者 (Entrepreneur) 必須是「機會驅動 (Opportunity-driven)」，擁有追求高成長的野心，而非僅為了餬口 (Necessity-driven)。要將點子落地，需要掌握 4T 執行架構：Team (團隊)、Tech (技術產品)、Traction (市場牽引力/需求) 與 Turnover (資本周轉)。",
m3_p2:"商業模式畫布 (BMC) 不是靜態的填空題，而是有繪製順序的。板書提供了黃金法則 (#1 Tip)：一切必須從校準「價值主張 (VP)」與「目標客群 (TA)」開始。這兩者之間的契合 (Product-Market Fit) 是整個畫布的心臟，若能解決 TA 的 JTBD 並成功變現 (RS)，商業模式才成立。",
m3_p3:"畫布的左右兩側各有側重：若企業是「服務導向 (Service-oriented)」，應重押右側綠色區塊 (#2)，專注於描繪顧客旅程 (User's Journey)、人物誌 (Persona) 以及顧客關係 (CR) 與通路 (CH)。若企業是「產品導向 (Product-oriented)」，則需重押左側藍色區塊 (#3)，專注於打磨關鍵活動 (KA)、資源 (KR) 與夥伴 (KP)，以確保成本結構 (CS) 不會壓垮營收。",
m3_img_orig:"./532972.jpg",
m3_img_svg:SVG_BMC,
m3_cards:[{title:"創業的 4T 執行架構",desc:"Team (創辦人與工程師等核心人力)、Tech (核心產品或服務)、Traction (市場證明的需求與動能)、Turnover (資本與營收的健康周轉)。"},{title:"動態 BMC 設計邏輯",desc:"順序至關重要。先確立 VP-TA-RS (橘色核心)，再依據商業本質決定資源要傾斜向產品端 (左側藍色) 還是市場端 (右側綠色)。"}],
m3_case_title:"顧問觀點：創業畫布的靈魂",
m3_case_desc:"許多學生會把 BMC 當作 9 個獨立的方塊來填寫，這是錯的。這張板書的價值在於它畫出了「動態連結」。沒有 VP 和 TA 的配對，左邊的關鍵活動 (KA) 只是在浪費錢；沒有搞懂自己是產品還是服務導向，成本結構 (CS) 就會失控。BMC 是一個會呼吸的系統。",
m3_terms:[{front:"VP ↔ TA",back:"Value Proposition (價值主張) 與 Target Audience (目標客群)：BMC 的起點與核心，代表產品市場契合度。"},{front:"產品 vs. 服務導向",back:"決定 BMC 側重點的策略分水嶺。產品重左半部 (生產、研發)，服務重右半部 (通路、顧客關係)。"},{front:"機會驅動",back:"Opportunity-driven：真正的創業精神，為了追求高成長潛力與野心而進入市場，非因生活所迫。"}],
m3_q:[
{q:"繪製商業模式畫布 (BMC) 時，最重要的第一步 (#1 Tip) 是什麼？",opts:["計算成本結構 (CS)","尋找關鍵夥伴 (KP)","確立價值主張 (VP) 與目標客群 (TA) 的校準","設計顧客關係 (CR)"],ans:_A2,exp:"板書明確標示 #1 Starts: VP - TA，因為沒有釐清為誰解決什麼問題，其餘構件皆無意義。"},
{q:"如果一家企業是「服務導向 (Service-oriented)」，它在 BMC 上應該特別關注哪一個區塊 (#2)？",opts:["左側的關鍵資源 (KR) 與活動 (KA)","底部的成本結構 (CS)","右側的顧客關係 (CR) 與通路 (CH)","上游的關鍵夥伴 (KP)"],ans:_A2,exp:"對於服務業，描繪顧客旅程、建立良好的 CR 與設計流暢的 CH 是創造價值的關鍵。"},
{q:"板書中提到的創業執行架構「4T」，包含 Team, Tech, Traction 與下列何者？",opts:["Time (時間)","Tactics (戰術)","Turnover (資本/周轉)","Target (目標)"],ans:_A2,exp:"4T 分別是 Team (團隊), Tech (技術), Traction (牽引力), Turnover (資本周轉)。"},
{q:"根據板書，真正的創業精神 (Entrepreneurship) 應該具備什麼屬性？",opts:["被迫謀生 (Necessity-driven)","規避所有風險 (Risk-averse)","純粹為了資源分配","機會驅動且具備高成長野心 (Opportunity-driven)"],ans:_A3,exp:"板書中將 Necessity-driven 打叉，並強調 Opportunity-driven 與 ambition for high growth potential。"}
],

m1_nav:"1. V-P-C Framework",m1_title:"The Nature of Value Creation: V-P-C Framework & Market Dynamics",
m1_p1:"Business model success relies on a simple logic: create value higher than price (V > P), and keep costs below price (P > C).",
m1_p2:"Firms must distinguish Wants from Needs, focus on JTBD to solve Pains and create Gains, pushing up the target audience's WTP. This sets the pricing ceiling. The ultimate goal is Monopoly.",
m1_p3:"Maximizing profit also requires cost reduction through Economies of Scale (EOS) reaching MES, and Economics of Learning (EOL) over time. TR minus TC is the true economic profit.",

m1_case_desc:"Find WTP via JTBD, set P based on market structure, drive down C via EOS/EOL. This forms the foundation of competition.",

const FlipCard=({front,back,t})=>{const[f,setF]=useState(false);return(<div className="perspective cursor-pointer h-36" onClick={()=>setF(!f)}><div className={`transform-style-3d relative w-full h-full transition-transform duration-500 ${f?'rotate-y-180':''}`}><div className="backface-hidden absolute inset-0 bg-white dark:bg-slate-800 rounded-xl p-4 flex flex-col items-center justify-center border border-slate-200 dark:border-slate-700 shadow-sm"><p className="font-serif font-bold text-center text-[#004030] dark:text-[#D8C3A5] text-sm">{front}</p><p className="text-xs text-slate-400 mt-2">{t.flip_prompt}</p></div><div className="backface-hidden rotate-y-180 absolute inset-0 bg-[#004030] dark:bg-slate-700 rounded-xl p-4 flex items-center justify-center"><p className="text-sm text-center text-[#D8C3A5] dark:text-slate-200 leading-relaxed">{back}</p></div></div></div>)};

const ModuleQuiz=({questions,t,moduleId,onQuizSubmit,moduleName})=>{
  const[selected,setSelected]=useState({});const[submitted,setSubmitted]=useState(false);
  const[quizIndices]=useState(()=>[...Array(questions.length).keys()].sort(()=>Math.random()-.5).slice(0,4));
  const[shuffledMaps]=useState(()=>quizIndices.map(qIdx=>{const n=questions[qIdx].opts.length;return[...Array(n).keys()].sort(()=>Math.random()-.5)}));
  const getResults=()=>{const wrongQs=[];let correct=0;quizIndices.forEach((qIdx,qi)=>{const dIdx=selected[qi];const oIdx=shuffledMaps[qi][dIdx];if(oIdx===_d(questions[qIdx].ans))correct++;else wrongQs.push(questions[qIdx].q)});return{correct,wrongQs}};
  const handleSubmit=()=>{if(Object.keys(selected).length<quizIndices.length)return;const{correct,wrongQs}=getResults();setSubmitted(true);onQuizSubmit(moduleId,correct,quizIndices.length,wrongQs,moduleName)};
  return(<div className="mt-8 bg-slate-50 dark:bg-slate-900/50 rounded-2xl p-4 sm:p-6 border border-slate-200 dark:border-slate-700"><h3 className="text-lg font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-6">{t.quiz_title}</h3>
    {quizIndices.map((qIdx,qi)=>{const q=questions[qIdx];const sMap=shuffledMaps[qi];return(<div key={qIdx} className="mb-6"><p className="font-bold mb-3">{qi+1}. {q.q}</p><div className="space-y-2">{sMap.map((origIdx,displayIdx)=>{const opt=q.opts[origIdx];const isCorrect=origIdx===_d(q.ans);const isSel=selected[qi]===displayIdx;return(<button key={displayIdx} onClick={()=>!submitted&&setSelected(s=>({...s,[qi]:displayIdx}))} className={`w-full text-left px-4 py-3 rounded-lg border transition-all text-sm ${submitted?isCorrect?'bg-green-100 border-green-500 dark:bg-green-900/30':isSel?'bg-red-100 border-red-400 dark:bg-red-900/30':'border-slate-200 dark:border-slate-700':isSel?'border-[#004030] dark:border-[#D8C3A5] bg-[#004030]/5':'border-slate-200 dark:border-slate-700 hover:border-slate-400'}`}>{opt}</button>)})}</div>{submitted&&<p className="mt-2 text-sm text-slate-600 dark:text-slate-400 italic">{t.explanation}：{q.exp}</p>}</div>)})}
    {!submitted?<button onClick={handleSubmit} disabled={Object.keys(selected).length<quizIndices.length} className="px-6 py-2 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40">{t.submit}</button>
    :<div className="flex items-center gap-4"><span className="font-bold text-[#004030] dark:text-[#D8C3A5]">{t.score}: {getResults().correct}/{quizIndices.length}</span><button onClick={()=>{setSelected({});setSubmitted(false)}} className="px-6 py-2 border border-[#004030] dark:border-[#D8C3A5] text-[#004030] dark:text-[#D8C3A5] font-bold rounded-lg">{t.retry}</button></div>}
  </div>)};

const LinkCard=({label,url,desc})=>(<a href={url} target="_blank" rel="noopener noreferrer" className="block bg-white dark:bg-slate-800 rounded-xl p-4 border border-slate-200 dark:border-slate-700 hover:border-[#004030] dark:hover:border-[#D8C3A5] hover:shadow-md transition-all group"><div className="flex items-start justify-between gap-2 mb-2"><span className="font-bold font-serif text-sm text-[#004030] dark:text-[#D8C3A5] group-hover:underline leading-snug">{label}</span><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="shrink-0 opacity-30 group-hover:opacity-70 mt-0.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></div><p className="text-xs text-slate-500 dark:text-slate-400 leading-relaxed">{desc}</p></a>);

/* ── Lab Components ── */
const VPCSimulator=({lang})=>{const[v,setV]=useState(100);const[p,setP]=useState(60);const[c,setC]=useState(30);const evc=v-c;const cs=Math.max(0,v-p);const fp=Math.max(0,p-c);const maxH=200;const scale=maxH/Math.max(v,1);return(<div className="bg-white dark:bg-slate-800 rounded-xl p-6 border border-slate-200 dark:border-slate-700"><h4 className="font-serif font-bold text-[#004030] dark:text-[#D8C3A5] mb-4">{lang==='zh'?'V-P-C 互動模擬器':'V-P-C Interactive Simulator'}</h4><div className="grid grid-cols-1 md:grid-cols-2 gap-6"><div className="space-y-4"><div><label className="text-sm font-bold">V ({lang==='zh'?'支付意願':'WTP'}): {v}</label><input type="range" min="0" max="200" value={v} onChange={e=>setV(+e.target.value)} className="w-full accent-[#004030]"/></div><div><label className="text-sm font-bold">P ({lang==='zh'?'價格':'Price'}): {p}</label><input type="range" min="0" max="200" value={p} onChange={e=>setP(+e.target.value)} className="w-full accent-[#D8C3A5]"/></div><div><label className="text-sm font-bold">C ({lang==='zh'?'成本':'Cost'}): {c}</label><input type="range" min="0" max="200" value={c} onChange={e=>setC(+e.target.value)} className="w-full accent-slate-500"/></div><div className="grid grid-cols-3 gap-2 text-center text-sm"><div className="bg-emerald-50 dark:bg-emerald-900/20 rounded-lg p-3"><div className="font-bold text-emerald-700 dark:text-emerald-400 text-lg">{evc}</div><div className="text-xs">{lang==='zh'?'經濟價值':'EVC'} (V-C)</div></div><div className="bg-blue-50 dark:bg-blue-900/20 rounded-lg p-3"><div className="font-bold text-blue-700 dark:text-blue-400 text-lg">{cs}</div><div className="text-xs">{lang==='zh'?'消費者剩餘':'CS'} (V-P)</div></div><div className="bg-amber-50 dark:bg-amber-900/20 rounded-lg p-3"><div className="font-bold text-amber-700 dark:text-amber-400 text-lg">{fp}</div><div className="text-xs">{lang==='zh'?'企業利潤':'Profit'} (P-C)</div></div></div></div><div className="flex items-end justify-center gap-8"><div className="flex flex-col items-center"><div style={{height:Math.max(cs*scale,2)+'px'}} className="w-16 bg-blue-400 rounded-t transition-all"></div><div style={{height:Math.max(fp*scale,2)+'px'}} className="w-16 bg-amber-400 transition-all"></div><div style={{height:Math.max(c*scale,2)+'px'}} className="w-16 bg-slate-300 rounded-b transition-all"></div><span className="text-xs mt-1 font-bold">{lang==='zh'?'價值分配':'Distribution'}</span></div></div></div></div>)};


/* ── App ── */
function App(){
  const LS_KEY='ITBM_SPA_analytics';const LS_STU='ITBM_SPA_student';
  const loadLS=(key,fb)=>{try{const v=localStorage.getItem(key);return v?JSON.parse(v):fb}catch{return fb}};
  const[lang,setLang]=useState('zh');const[isDark,setIsDark]=useState(false);const[module,setModule]=useState(0);
  const[menuOpen,setMenuOpen]=useState(false);const[ttsState,setTtsState]=useState('idle');
  const[studentInfo,setStudentInfo]=useState(()=>loadLS(LS_STU,{group:'',dept:'',id:'',nameEn:'',nameZh:''}));
  const[analytics,setAnalytics]=useState(()=>loadLS(LS_KEY,{time:Array(TOTAL).fill(0),clicks:Array(TOTAL).fill(0),quizCorrect:Array(TOTAL).fill(0),quizTotal:Array(TOTAL).fill(0),wrongTopics:{}}));
  const contentRef=useRef(null);const menuRef=useRef(null);const t=dict[lang];

  useEffect(()=>{document.documentElement.classList.toggle('dark',isDark)},[isDark]);
  useEffect(()=>{window.scrollTo({top:0,behavior:'smooth'});if(window.speechSynthesis)window.speechSynthesis.cancel();setTtsState('idle')},[module]);
  useEffect(()=>{const timer=setInterval(()=>{setAnalytics(a=>{const nt=[...a.time];nt[module]++;return{...a,time:nt}})},1000);return()=>clearInterval(timer)},[module]);
  useEffect(()=>{if(!menuOpen)return;const handler=e=>{if(menuRef.current&&!menuRef.current.contains(e.target))setMenuOpen(false)};document.addEventListener('mousedown',handler);return()=>document.removeEventListener('mousedown',handler)},[menuOpen]);
  useEffect(()=>{try{localStorage.setItem(LS_KEY,JSON.stringify(analytics))}catch{}},[analytics]);
  useEffect(()=>{try{localStorage.setItem(LS_STU,JSON.stringify(studentInfo))}catch{}},[studentInfo]);

  const handleClick=()=>{setAnalytics(a=>{const nc=[...a.clicks];nc[module]++;return{...a,clicks:nc}})};
  const handleQuizSubmit=(mid,correct,total,wrongQs,moduleName)=>{setAnalytics(a=>{const qc=[...a.quizCorrect],qt=[...a.quizTotal];qc[mid]=correct;qt[mid]=total;const wt={...a.wrongTopics};wt[mid]=wrongQs||[];return{...a,quizCorrect:qc,quizTotal:qt,wrongTopics:wt}})};
  const handleClearHistory=()=>{if(window.confirm(t.analytics_wp_clear_confirm)){localStorage.removeItem(LS_KEY);localStorage.removeItem(LS_STU);setAnalytics({time:Array(TOTAL).fill(0),clicks:Array(TOTAL).fill(0),quizCorrect:Array(TOTAL).fill(0),quizTotal:Array(TOTAL).fill(0),wrongTopics:{}});setStudentInfo({group:'',dept:'',id:'',nameEn:'',nameZh:''})}};

  const mKeys=['m1','m2','m3'];
  const modulesList=[
    {id:0,icon:<IconBookOpen size={16}/>,title:t.m0_nav},
    {id:1,icon:<IconTrendingUp size={16}/>,title:t.m1_nav},
    {id:2,icon:<IconLayers size={16}/>,title:t.m2_nav},
    {id:3,icon:<IconActivity size={16}/>,title:t.m3_nav},
    {id:4,icon:<IconGlobe size={16}/>,title:t.m6_nav},
    {id:5,icon:<IconZapLab size={16}/>,title:t.mlab_nav},
    {id:6,icon:<IconActivity size={16}/>,title:t.analytics_title}
  ];

  const handleTTS=(action)=>{if(!('speechSynthesis' in window))return;if(action==='stop'){window.speechSynthesis.cancel();setTtsState('idle');return}if(action==='pause'){window.speechSynthesis.pause();setTtsState('paused');return}if(action==='play'){if(ttsState==='paused'){window.speechSynthesis.resume();setTtsState('playing');return}window.speechSynthesis.cancel();const sep=lang==='zh'?'。 ':'. ';let texts=[];if(module===0){texts=[t.m0_title,t.m0_intro,t.m0_why,t.m0_why_desc,...(t.m0_stats||[]).map(s=>`${s.label}: ${s.val}`),...(t.m0_modules||[]).map(m=>`${m.title}. ${m.desc}`)].filter(Boolean)}else if(module>=1&&module<=N){const mk=mKeys[module-1];texts=[t[`${mk}_title`],...[1,2,3,4,5].map(n=>t[`${mk}_p${n}`]).filter(Boolean),...(t[`${mk}_cards`]||[]).map(c=>`${c.title}. ${c.desc}`),t[`${mk}_case_title`],t[`${mk}_case_desc`],...(t[`${mk}_terms`]||[]).flatMap(term=>[term.front,term.back])].filter(Boolean)}else if(module===N+1){texts=[t.m6_title,t.m6_desc].filter(Boolean)}else if(module===N+2){texts=[t.mlab_title,t.mlab_desc].filter(Boolean)}else{const tc=analytics.quizCorrect.reduce((a,b)=>a+b,0);const ta=analytics.quizTotal.reduce((a,b)=>a+b,0);const oa=ta>0?Math.round(tc/ta*100):0;const wk=[];for(let wi=1;wi<=N;wi++){if(analytics.quizTotal[wi]>0){const wa=Math.round(analytics.quizCorrect[wi]/analytics.quizTotal[wi]*100);if(wa<75)wk.push({name:modulesList[wi].title,acc:wa})}}texts=[t.analytics_title,t.analytics_desc,`${t.analytics_total_time}: ${analytics.time.reduce((a,b)=>a+b,0)}${t.analytics_sec}`,`${t.analytics_overall_acc}: ${oa}%`];if(wk.length>0){texts.push(t.analytics_wp_tts_intro);wk.forEach(wm=>{texts.push(t.analytics_wp_tts_module.replace('{name}',wm.name).replace('{acc}',wm.acc))})}else if(ta>0){texts.push(t.analytics_wp_tts_allpass)}texts=texts.filter(Boolean)}const text=texts.join(sep);const utterance=new SpeechSynthesisUtterance(text);utterance.rate=0.95;const voices=window.speechSynthesis.getVoices();if(lang==='zh'){const v=voices.find(v=>v.lang==='zh-TW'&&v.name.includes('Yating'))||voices.find(v=>v.lang==='zh-TW')||voices.find(v=>v.lang.startsWith('zh'));if(v)utterance.voice=v;utterance.lang='zh-TW'}else{const v=voices.find(v=>v.lang==='en-GB'&&v.name.includes('Daniel'))||voices.find(v=>v.lang==='en-GB')||voices.find(v=>v.lang.startsWith('en'));if(v)utterance.voice=v;utterance.lang='en-GB'}utterance.onend=()=>setTtsState('idle');utterance.onerror=()=>setTtsState('idle');window.speechSynthesis.speak(utterance);setTtsState('playing')}};

  const handleExportCSV=()=>{const BOM='\uFEFF';const navLabels=[t.m1_nav,t.m2_nav,t.m3_nav,t.m6_nav,t.mlab_nav,t.analytics_title];const rows=[[t.analytics_group,t.analytics_dept,t.analytics_id,t.analytics_name_en,t.analytics_name_zh],[studentInfo.group,studentInfo.dept,studentInfo.id,studentInfo.nameEn,studentInfo.nameZh],[],[t.analytics_module,t.analytics_time,t.analytics_clicks,t.analytics_acc,t.analytics_correct_ans_total,'Wrong Questions'],...Array.from({length:TOTAL-1},(_,i)=>{const idx=i+1;const acc=analytics.quizTotal[idx]>0?Math.round(analytics.quizCorrect[idx]/analytics.quizTotal[idx]*100)+'%':t.analytics_no_data;const ans=analytics.quizTotal[idx]>0?`${analytics.quizCorrect[idx]}/${analytics.quizTotal[idx]}/4`:t.analytics_no_data;const wq=(analytics.wrongTopics[idx]||[]).join('; ');return[navLabels[i]||`M${idx}`,analytics.time[idx]+t.analytics_sec,analytics.clicks[idx]+t.analytics_times,acc,ans,'"'+wq+'"']})];const csv=BOM+rows.map(r=>r.join(',')).join('\n');const now=new Date();const ds=`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;const fn=`${dict.zh.brand} ${dict.zh.title}_${studentInfo.nameEn} ${studentInfo.nameZh}_${ds}.csv`;const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download=fn;a.click()};

  const H2=({children,icon})=>(<h2 className="text-2xl sm:text-3xl md:text-4xl font-serif font-black text-[#004030] dark:text-[#D8C3A5] mb-6 flex items-center gap-3 border-b-2 border-[#D8C3A5] pb-4">{icon&&<span className="opacity-70">{icon}</span>}<span>{children}</span></h2>);

  const renderNavBottom=()=>(<div className="mt-12 flex justify-between items-center pt-8 border-t border-slate-300 dark:border-slate-700"><button onClick={()=>setModule(Math.max(0,module-1))} disabled={module===0} className="px-6 py-3 font-serif font-bold text-slate-500 hover:text-[#004030] dark:hover:text-[#D8C3A5] disabled:opacity-0 transition-colors flex items-center uppercase text-sm tracking-wider">← {t.nav_prev}</button><button onClick={()=>setModule(Math.min(TOTAL-1,module+1))} disabled={module===TOTAL-1} className="px-8 py-3 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-serif font-bold hover:bg-[#002b20] disabled:opacity-0 transition-colors flex items-center uppercase text-sm tracking-wider shadow-md">{t.nav_next} <IconArrowRight size={16} className="ml-2"/></button></div>);

  const renderModule=(mk,midx)=>{const base="space-y-6 text-base leading-relaxed text-slate-700 dark:text-slate-300 animate-fade-in";return(<div className={base}><H2 icon={modulesList[midx].icon}>{t[`${mk}_title`]}</H2><p>{t[`${mk}_p1`]}</p><p className="p-4 bg-slate-100 dark:bg-slate-800 rounded-lg italic font-serif text-slate-600 dark:text-slate-300">{t[`${mk}_p2`]}</p><p>{t[`${mk}_p3`]}</p> <VisualComparison origImg={t[`${mk}_img_orig`]} svgContent={t[`${mk}_img_svg`]} lang={lang} /> <div className="grid md:grid-cols-2 gap-6">{t[`${mk}_cards`].map((c,i)=>(<div key={i} className="bg-white dark:bg-slate-800 p-6 rounded-xl border-l-4 border-[#004030] shadow-sm hover:shadow-md transition-shadow"><h3 className="text-base font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-2">{c.title}</h3><p className="text-sm leading-relaxed">{c.desc}</p></div>))}</div><div className="bg-[#004030] text-[#D8C3A5] p-5 rounded-xl shadow-md"><h4 className="font-bold font-serif text-base mb-2">{t[`${mk}_case_title`]}</h4><p className="text-sm opacity-90 leading-relaxed">{t[`${mk}_case_desc`]}</p></div><div className="mt-8"><h3 className="text-sm font-bold uppercase tracking-wider text-slate-500 mb-4">{t.key_terms}</h3><div key={`terms-${midx}`} className="grid grid-cols-1 md:grid-cols-3 gap-4">{t[`${mk}_terms`].map((term,i)=><FlipCard key={i} front={term.front} back={term.back} t={t}/>)}</div></div><ModuleQuiz key={`quiz-${midx}`} questions={t[`${mk}_q`]} t={t} moduleId={midx} onQuizSubmit={handleQuizSubmit} moduleName={t[`${mk}_title`]}/>{renderNavBottom()}</div>)};

  const renderResources=()=>{const mainLinks=[{label:lang==='zh'?'Strategyzer: 商業模式畫布資源':'Strategyzer: BMC Resources',url:'https://www.strategyzer.com/library/the-business-model-canvas',desc:lang==='zh'?'BMC 官方工具、範本與教學資源':'Official tools, templates and resources for BMC'},{label:lang==='zh'?'HBR: 什麼是策略？':'HBR: What is Strategy?',url:'https://hbr.org/1996/11/what-is-strategy',desc:lang==='zh'?'Michael Porter 的經典文章，探討營運效益與策略差異':'Michael Porter\'s classic article on strategy'}];return(<div className="space-y-10 animate-fade-in"><H2 icon={modulesList[4].icon}>{t.m6_title}</H2><p className="text-slate-600 dark:text-slate-400">{t.m6_desc}</p><div className="grid md:grid-cols-2 gap-3">{mainLinks.map((l,i)=><LinkCard key={i} {...l}/>)}</div><div className="bg-[#004030]/5 dark:bg-[#D8C3A5]/5 rounded-xl p-5 border border-[#004030]/20 dark:border-[#D8C3A5]/20"><p className="text-sm text-slate-600 dark:text-slate-400">⚠️ {lang==='zh'?'外部連結由第三方提供，內容可能隨時變動。本頁面僅供教育用途之參考。':'External links are provided by third parties. For educational reference only.'}</p></div>{renderNavBottom()}</div>)};

  const renderLab=()=>(<div className="space-y-8 animate-fade-in"><H2 icon={modulesList[5].icon}>{t.mlab_title}</H2><p className="text-slate-600 dark:text-slate-400">{t.mlab_desc}</p><VPCSimulator lang={lang}/>{renderNavBottom()}</div>);

  const renderAnalytics=()=>{const totalTime=analytics.time.reduce((a,b)=>a+b,0);const totalClicks=analytics.clicks.reduce((a,b)=>a+b,0);const totalCorrect=analytics.quizCorrect.reduce((a,b)=>a+b,0);const totalQuiz=analytics.quizTotal.reduce((a,b)=>a+b,0);const overallAcc=totalQuiz>0?Math.round(totalCorrect/totalQuiz*100):0;const canExport=studentInfo.group&&studentInfo.dept&&studentInfo.id&&studentInfo.nameEn&&studentInfo.nameZh;const navLabels=[t.m0_nav,t.m1_nav,t.m2_nav,t.m3_nav,t.m6_nav,t.mlab_nav,t.analytics_title];
  const weakModules=[];for(let wi=1;wi<=N;wi++){if(analytics.quizTotal[wi]>0){const wa=Math.round(analytics.quizCorrect[wi]/analytics.quizTotal[wi]*100);if(wa<75)weakModules.push({id:wi,name:modulesList[wi].title,acc:wa,wrongs:analytics.wrongTopics[wi]||[]})}}weakModules.sort((a,b)=>a.acc-b.acc);
  const progressModules=[];for(let pi=1;pi<=N;pi++){const visited=analytics.time[pi]>0;const quizDone=analytics.quizTotal[pi]>0;const acc=quizDone?Math.round(analytics.quizCorrect[pi]/analytics.quizTotal[pi]*100):0;progressModules.push({id:pi,name:modulesList[pi].title,visited,quizDone,acc})}
  return(<div className="space-y-8 animate-fade-in"><H2 icon={modulesList[6].icon}>{t.analytics_title}</H2><p className="text-slate-600 dark:text-slate-400">{t.analytics_desc}</p><p className="text-xs text-emerald-600 dark:text-emerald-400">{t.analytics_wp_saved}</p>
    <div className="grid grid-cols-2 md:grid-cols-3 gap-4">{[[totalTime+t.analytics_sec,t.analytics_total_time],[totalClicks+t.analytics_times,t.analytics_total_clicks],[overallAcc+'%',t.analytics_overall_acc]].map(([val,label],i)=>(<div key={i} className="bg-white dark:bg-slate-800 rounded-xl p-5 text-center shadow-sm border border-slate-200 dark:border-slate-700"><div className="text-2xl font-black font-serif text-[#004030] dark:text-[#D8C3A5]">{val}</div><div className="text-xs text-slate-500">{label}</div></div>))}</div>
    <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border border-slate-200 dark:border-slate-700"><h3 className="font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-4">{t.analytics_progress_title}</h3><div className="space-y-3">{progressModules.map(pm=>(<div key={pm.id} className="flex items-center gap-3"><button onClick={()=>setModule(pm.id)} className="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold shrink-0" style={{background:pm.quizDone?'#004030':pm.visited?'#D8C3A5':'#e2e8f0',color:pm.quizDone?'#D8C3A5':pm.visited?'#004030':'#94a3b8'}}>{pm.id}</button><div className="flex-1 min-w-0"><div className="flex justify-between items-center mb-1"><span className="text-sm font-medium truncate">{pm.name}</span><span className="text-xs shrink-0 ml-2">{pm.quizDone?`${pm.acc}%`:pm.visited?t.analytics_progress_visited:t.analytics_progress_not_visited}</span></div><div className="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-2"><div style={{width:pm.quizDone?pm.acc+'%':pm.visited?'30%':'0%'}} className={`h-2 rounded-full transition-all ${pm.quizDone?(pm.acc>=75?'bg-emerald-500':'bg-amber-500'):'bg-slate-400'}`}></div></div></div></div>))}</div></div>
    <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border border-slate-200 dark:border-slate-700"><h3 className="font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-4">{t.analytics_wp_title}</h3>{weakModules.length>0?weakModules.map(wm=>(<div key={wm.id} className="mb-4 p-4 bg-red-50 dark:bg-red-900/10 rounded-lg border border-red-200 dark:border-red-800"><div className="flex justify-between items-center mb-2"><span className="font-bold">{wm.name}</span><span className="text-sm font-bold text-red-600">{wm.acc}%</span></div><div className="w-full bg-red-200 dark:bg-red-900/30 rounded-full h-2 mb-2"><div style={{width:wm.acc+'%'}} className="bg-red-500 h-2 rounded-full"></div></div>{wm.wrongs.length>0&&<div className="text-xs text-red-700 dark:text-red-300 mb-2"><span className="font-bold">{t.analytics_wp_incorrect}</span>{wm.wrongs.map((w,i)=><span key={i} className="block ml-2">• {w}</span>)}</div>}<button onClick={()=>setModule(wm.id)} className="text-xs font-bold text-[#004030] dark:text-[#D8C3A5] hover:underline">{t.analytics_wp_goto}</button></div>)):totalQuiz>0?<div className="text-center p-6 text-emerald-600 dark:text-emerald-400 font-bold">🎉 {t.analytics_wp_allpass}</div>:null}</div>
    <div className="overflow-x-auto"><table className="w-full text-sm"><thead><tr className="bg-slate-100 dark:bg-slate-700"><th className="px-3 py-2 text-left">{t.analytics_module}</th><th className="px-3 py-2">{t.analytics_time}</th><th className="px-3 py-2">{t.analytics_clicks}</th><th className="px-3 py-2">{t.analytics_acc}</th></tr></thead><tbody>{navLabels.map((label,i)=>(<tr key={i} className="border-b border-slate-200 dark:border-slate-700"><td className="px-3 py-2 font-medium">{label}</td><td className="px-3 py-2 text-center">{analytics.time[i]}{t.analytics_sec}</td><td className="px-3 py-2 text-center">{analytics.clicks[i]}{t.analytics_times}</td><td className="px-3 py-2 text-center">{analytics.quizTotal[i]>0?Math.round(analytics.quizCorrect[i]/analytics.quizTotal[i]*100)+'%':t.analytics_no_data}</td></tr>))}</tbody></table></div>
    <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border border-slate-200 dark:border-slate-700"><h3 className="font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-4">{t.analytics_form_title}</h3><div className="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div><label className="text-sm font-bold block mb-1">{t.analytics_group}</label><select value={studentInfo.group} onChange={e=>setStudentInfo(s=>({...s,group:e.target.value}))} className="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 dark:bg-slate-700"><option value="">{t.analytics_group_select}</option>{t.group_options.map(g=><option key={g} value={g}>{g}</option>)}</select></div>
      <div><label className="text-sm font-bold block mb-1">{t.analytics_dept}</label><input placeholder={t.analytics_dept_ph} value={studentInfo.dept} onChange={e=>setStudentInfo(s=>({...s,dept:e.target.value}))} className="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 dark:bg-slate-700"/></div>
      <div><label className="text-sm font-bold block mb-1">{t.analytics_id}</label><input placeholder={t.analytics_id_ph} value={studentInfo.id} onChange={e=>setStudentInfo(s=>({...s,id:e.target.value}))} className="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 dark:bg-slate-700"/></div>
      <div><label className="text-sm font-bold block mb-1">{t.analytics_name_en}</label><input placeholder={t.analytics_name_en_ph} value={studentInfo.nameEn} onChange={e=>setStudentInfo(s=>({...s,nameEn:e.target.value}))} className="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 dark:bg-slate-700"/></div>
      <div><label className="text-sm font-bold block mb-1">{t.analytics_name_zh}</label><input placeholder={t.analytics_name_zh_ph} value={studentInfo.nameZh} onChange={e=>setStudentInfo(s=>({...s,nameZh:e.target.value}))} className="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 dark:bg-slate-700"/></div>
    </div><div className="flex items-center gap-4 mt-4"><button onClick={handleExportCSV} disabled={!canExport} className="px-6 py-2 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40">{canExport?t.analytics_export_csv:t.analytics_fill_required}</button><button onClick={handleClearHistory} className="px-4 py-2 bg-red-600 hover:bg-red-700 text-white text-sm font-bold rounded-lg">{t.analytics_wp_clear}</button></div></div>
  </div>)};

  const renderContent=()=>{
    if(module===0)return(<div className="space-y-8 text-lg leading-relaxed text-slate-700 dark:text-slate-300 animate-fade-in"><div className="bg-[#004030] dark:bg-slate-800 rounded-2xl p-6 sm:p-8 text-white"><p className="text-xs font-bold uppercase tracking-widest text-[#D8C3A5] mb-3">{lang==='zh'?'課程簡介':'Course Introduction'}</p><h2 className="text-2xl sm:text-3xl md:text-4xl font-serif font-black text-white mb-4">{t.m0_title}</h2><p className="text-[#D8C3A5]/90 text-base leading-relaxed">{t.m0_intro}</p></div><div className="bg-white dark:bg-slate-800 rounded-xl p-6 border-l-4 border-[#D8C3A5] shadow-sm"><h3 className="text-xl font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-3">{t.m0_why}</h3><p className="text-base">{t.m0_why_desc}</p></div><div className="grid grid-cols-2 md:grid-cols-4 gap-4">{t.m0_stats.map((s,i)=>(<div key={i} className="bg-white dark:bg-slate-800 rounded-xl p-5 text-center shadow-sm border border-slate-200 dark:border-slate-700"><div className="text-2xl md:text-3xl font-black font-serif text-[#004030] dark:text-[#D8C3A5] mb-1">{s.val}</div><div className="text-xs text-slate-500 dark:text-slate-400">{s.label}</div></div>))}</div><div><h3 className="text-lg font-bold uppercase tracking-wider text-slate-500 mb-4">{lang==='zh'?'課程模組':'Course Modules'}</h3><div className="space-y-3">{t.m0_modules.map((m,i)=>(<button key={i} onClick={()=>setModule(i+1)} className="w-full flex items-center gap-5 bg-white dark:bg-slate-800 rounded-xl px-6 py-4 border border-slate-200 dark:border-slate-700 hover:border-[#D8C3A5] hover:shadow-md transition-all group text-left"><div className="text-3xl font-black font-serif text-[#D8C3A5] w-10 shrink-0">{m.num}</div><div className="flex-1 min-w-0"><div className="font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-1">{m.title}</div><div className="text-sm text-slate-500 truncate">{m.desc}</div></div><IconChevronRight size={20} className="text-slate-300 group-hover:text-[#004030] dark:group-hover:text-[#D8C3A5] transition-colors shrink-0"/></button>))}</div></div><div className="flex justify-end"><button onClick={()=>setModule(1)} className="px-8 py-3 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-serif font-bold hover:bg-[#002b20] dark:hover:bg-white transition-colors rounded-lg shadow-md">{t.m0_start}</button></div></div>);
    if(module>=1&&module<=N)return renderModule(mKeys[module-1],module);
    if(module===N+1)return renderResources();
    if(module===N+2)return renderLab();
    return renderAnalytics();
  };

  return(<div className="min-h-screen bg-[#f4f4f4] dark:bg-[#121212] font-sans flex flex-col overflow-x-hidden pt-16 selection:bg-[#004030] selection:text-white dark:selection:bg-[#D8C3A5] dark:selection:text-[#004030]">
    <header className="fixed top-0 left-0 right-0 h-16 bg-[#004030] dark:bg-slate-900 text-white z-50 shadow-lg border-b border-[#D8C3A5]/30"><div className="max-w-7xl mx-auto px-3 sm:px-4 lg:px-6 h-16 flex items-center justify-between"><div className="flex items-center space-x-3"><div className="relative" ref={menuRef}><button className="p-2 hover:bg-white/10 rounded-lg" onClick={()=>setMenuOpen(!menuOpen)}>{menuOpen?<IconX size={20}/>:<IconMenu size={20}/>}</button>{menuOpen&&(<div className="absolute top-full left-0 mt-1 w-64 max-w-[calc(100vw-2rem)] max-h-[calc(100vh-5rem)] overflow-y-auto bg-white dark:bg-slate-800 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-700 z-[100] overflow-x-hidden"><div className="bg-[#004030]/5 dark:bg-[#D8C3A5]/5 px-4 py-2 border-b border-slate-200 dark:border-slate-700"><p className="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">{t.nav_modules}</p></div>{modulesList.map(m=>(<button key={m.id} onClick={()=>{setModule(m.id);setMenuOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-3 text-sm font-medium transition-colors text-left ${module===m.id?'bg-[#004030] text-white dark:bg-[#D8C3A5]/20 dark:text-[#D8C3A5] font-bold':'text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700/50'}`}><span className={module===m.id?'text-[#D8C3A5]':'opacity-50'}>{m.icon}</span><span className="truncate">{m.title}</span></button>))}</div>)}</div>
      <button onClick={()=>window.scrollTo({top:0,behavior:'smooth'})} className="flex items-center gap-2 hover:opacity-80 transition-opacity"><div className="font-serif font-black text-lg tracking-widest text-[#D8C3A5]">{t.brand}</div><div className="hidden sm:block text-left"><h1 className="font-serif font-bold text-sm md:text-base leading-tight">{t.title}</h1><p className="text-[10px] text-[#D8C3A5]/70">{t.subtitle}</p></div></button></div>
      <div className="flex items-center space-x-1"><div className="flex items-center space-x-1 mr-2">{ttsState!=='playing'?(<button onClick={()=>handleTTS('play')} title={t.audio_read} className="p-2 rounded-full hover:bg-white/10 transition-colors flex items-center space-x-1 text-xs"><IconPlay size={14}/><span className="hidden md:inline">{t.audio_read}</span></button>):(<button onClick={()=>handleTTS('pause')} className="p-2 rounded-full hover:bg-white/10 transition-colors"><IconPause size={14}/></button>)}{ttsState!=='idle'&&<button onClick={()=>handleTTS('stop')} className="p-2 rounded-full hover:bg-white/10 transition-colors"><IconSquare size={14}/></button>}</div><button onClick={()=>setLang(lang==='zh'?'en':'zh')} className="px-3 py-1 rounded-full bg-white/10 hover:bg-white/20 text-sm font-bold transition-colors">{lang==='zh'?'EN':'中文'}</button><button onClick={()=>setIsDark(!isDark)} className="p-2 rounded-full hover:bg-white/10 transition-colors">{isDark?<IconSun size={18}/>:<IconMoon size={18}/>}</button></div></div></header>

    <div className="max-w-7xl mx-auto w-full px-3 sm:px-4 lg:px-6 flex-1 flex flex-col md:flex-row gap-0 py-6">
      <aside className="hidden md:block w-64 shrink-0 mr-6"><div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden sticky top-24"><div className="bg-[#004030]/5 dark:bg-[#D8C3A5]/5 px-4 py-3 border-b border-slate-200 dark:border-slate-700"><p className="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">{t.nav_modules}</p></div><nav className="space-y-0.5 p-2">{modulesList.map(m=>(<button key={m.id} onClick={()=>{setModule(m.id);setMenuOpen(false)}} className={`w-full flex items-center px-3 py-2.5 rounded-lg text-sm font-medium transition-colors text-left ${module===m.id?'bg-[#004030] dark:bg-[#D8C3A5]/20 text-white dark:text-[#D8C3A5] border border-[#D8C3A5]/30':'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700/50'}`}><span className={`mr-2.5 ${module===m.id?'text-[#D8C3A5]':'opacity-50'}`}>{m.icon}</span><span className="truncate">{m.title}</span>{module===m.id&&<IconChevronRight size={14} className="ml-auto opacity-50 shrink-0"/>}</button>))}</nav></div></aside>
      <main ref={contentRef} className="flex-1 min-w-0" onClick={handleClick}><div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm p-4 sm:p-6 md:p-8">{renderContent()}</div></main>
    </div>

    <footer className="bg-[#004030] dark:bg-slate-950 text-slate-300 dark:text-slate-400 border-t border-[#D8C3A5]"><div className="max-w-7xl mx-auto px-4 h-8 flex justify-between items-center text-[10px] sm:text-xs"><div className="flex items-center space-x-2 md:space-x-4"><div className="font-serif font-black text-[#D8C3A5] hidden sm:block tracking-widest text-sm">{t.brand}</div><span className="truncate">{t.copyright} · {t.date}</span></div><div className="flex items-center space-x-3 md:space-x-4"><span className="text-[#D8C3A5]/70 font-serif hidden sm:inline">Architect:&nbsp;<a href={t.architect_url} target="_blank" rel="noopener noreferrer" className="text-[#D8C3A5] hover:text-white underline underline-offset-2 transition-colors">Prof. Shihmin Lo</a></span><button onClick={()=>window.scrollTo({top:0,behavior:'smooth'})} className="text-[#D8C3A5] hover:text-white transition-colors font-bold cursor-pointer border-l border-slate-600 pl-3">Top ↑</button></div></div></footer>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
